            'rspro': {
                group: 'H24 Sports Performance', title: 'H24 RS Pro (Muscle Synthesis)', tag: 'KINETIC RECOVERY',
                client: {
                    desc: "A high-performance post-workout recovery shake. Delivers a blend of fast and slow-digesting proteins to support muscle repair after intense kinetic exertion.",
                    benefits: ["Whey and Casein protein blend", "Includes BCAAs and L-Glutamine", "Supports rapid muscle recovery"],
                    usage: "Mix 2 scoops with 250ml water immediately post-workout (within 30 minutes)."
                },
                architect: {
                    wolf: "Biphasic protein delivery. Whey provides immediate amino acid spikes to halt catabolism; Casein ensures a prolonged trickle for deep tissue repair. High L-Glutamine protects immune system post-exertion.",
                    shepherd: "This is the immediate repair mortar for the bricks you just broke in the gym. If you don't take this within 30 minutes of training, you are failing to rebuild the muscle.",

            'cr7': {
                group: 'H24 Sports Performance', title: 'H24 CR7 Drive (Electrolyte Matrix)', tag: 'HYDRATION',
                client: {
                    desc: "An advanced hypotonic hydration drink designed to maintain endurance and enhance water absorption during exercise.",
                    benefits: ["Replaces vital electrolytes lost via sweat", "4-carb matrix for sustained energy", "No artificial flavors or sweeteners"],
                    usage: "Mix 1 scoop with 250ml water during exercise."
                },
                architect: {
                    wolf: "Combines multiple carbohydrate sources for rapid gastric emptying and sustained ATP production. Replaces critical electrolytes lost via sweat without artificial dyes.",
                    shepherd: "This is the intra-workout coolant that keeps your engine from overheating. It forces water and electrolytes directly into your cells while you train, so you don't crash mid-session.",
                    objection: "I just drink Gatorade/100 Plus -> Commercial sports drinks are loaded with high-fructose corn syrup and dyes. CR7 uses a precise, 4-carb blend and natural Acai to hydrate cells without spiking your insulin.",

                }
            }
        };

        function initNav() {
            const nav = document.getElementById('sidebar-nav');
            let currentGroup = '';
            let navHtml = '';
            
            for (const [key, data] of Object.entries(db)) {
                if (data.group !== currentGroup) {
                    currentGroup = data.group;
                    navHtml += `<div class="p-4 mt-2 border-b border-[#222] bg-[#111] sticky top-0 z-10 shadow-sm"><p class="text-[9px] mono text-[#3de0b0] uppercase tracking-widest font-bold">${currentGroup}</p></div>`;
                }
                navHtml += `<div class="nav-item p-4 text-xs text-[#aaa] border-b border-[#1a1a1a] transition-colors" onclick="loadModule('${key}')" id="nav-${key}">${data.title}</div>`;
            }
            nav.innerHTML = navHtml;
        }

        function loadModule(id) {
            activeModuleId = id;
            
            // Update Active State in Nav
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active');
                if (isArchitectMode) el.classList.add('architect-mode');
                else el.classList.remove('architect-mode');
            });
            const activeEl = document.getElementById(`nav-${id}`);
            if(activeEl) activeEl.classList.add('active');
            
            const data = db[id];
            const display = document.getElementById('module-display');
            
            // Client Layer Structure
            let html = `
                <div class="max-w-4xl mx-auto fade-in pb-12">
                    <div class="mb-8 border-b border-[#222] pb-8">
                        <span class="inline-block px-3 py-1 text-[9px] mono uppercase tracking-widest bg-[#111] text-[#aaa] rounded mb-4 border border-[#333] shadow-sm">${data.tag}</span>
                        <h2 class="text-3xl md:text-4xl font-bold uppercase tracking-tighter text-white mb-6">${data.title}</h2>
                        
                        <div class="bg-[#111] border-l-4 border-[#3de0b0] p-6 rounded shadow-md mb-6">
                            <h3 class="text-[10px] text-[#888] font-bold uppercase tracking-widest mb-3">Protocol Overview</h3>
                            <p class="text-sm text-[#eee] leading-relaxed">${data.client.desc}</p>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="bg-[#0a0a0a] border border-[#222] p-5 rounded-lg shadow-sm">
                                <h3 class="text-[10px] text-[#888] font-bold uppercase tracking-widest mb-3 flex items-center gap-2">
                                    <svg class="w-3 h-3 text-[#3de0b0]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                    Biological Benefits
                                </h3>
                                <ul class="list-none text-xs text-[#ccc] space-y-2">
                                    ${data.client.benefits.map(b => `<li class="flex items-start gap-2"><span class="text-[#555] mt-0.5">•</span><span>${b}</span></li>`).join('')}
                                </ul>
                            </div>
                            <div class="bg-[#0a0a0a] border border-[#222] p-5 rounded-lg shadow-sm">
                                <h3 class="text-[10px] text-[#888] font-bold uppercase tracking-widest mb-3 flex items-center gap-2">
                                    <svg class="w-3 h-3 text-[#3de0b0]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    Usage Directive
                                </h3>
                                <p class="text-xs text-[#ccc] leading-relaxed">${data.client.usage}</p>
                            </div>
                        </div>
                    </div>
            `;
            
            // Architect Layer Structure
            if (isArchitectMode && data.architect) {
                const a = data.architect;
                html += `
                    <div class="border-t border-[#f0b429]/30 pt-8 mt-8 fade-in">
                        <div class="flex items-center gap-3 mb-6 bg-[#1a1500] border border-[#f0b429]/40 p-3 rounded w-fit shadow-[0_0_15px_rgba(240,180,41,0.1)]">
                            <span class="w-2.5 h-2.5 bg-[#f0b429] rounded-full animate-pulse shadow-[0_0_8px_#f0b429]"></span>
                            <h3 class="text-xs font-bold text-[#f0b429] uppercase tracking-widest">Architect Combat Data Unlocked</h3>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                            <div class="bg-[#050505] border border-[#333] p-6 rounded-lg relative overflow-hidden shadow-md group hover:border-[#555] transition-colors">
                                <div class="absolute top-0 left-0 w-1 h-full bg-[#555]"></div>
                                <h4 class="text-[10px] font-bold uppercase tracking-widest text-[#888] mb-3">The Wolf (Bio-Mechanism)</h4>
                                <p class="text-sm text-[#ccc] leading-relaxed">${a.wolf}</p>
                            </div>
                            <div class="bg-[#050505] border border-[#333] p-6 rounded-lg relative overflow-hidden shadow-md group hover:border-[#3de0b0] transition-colors">
                                <div class="absolute top-0 left-0 w-1 h-full bg-[#3de0b0]"></div>
                                <h4 class="text-[10px] font-bold uppercase tracking-widest text-[#3de0b0] mb-3">The Shepherd (Translation)</h4>
                                <p class="text-sm text-white leading-relaxed italic">"${a.shepherd}"</p>
                            </div>
                        </div>
                `;
                
                if (a.objection) {
                    html += `
                        <div class="bg-gradient-to-r from-[#111] to-[#0a0a0a] border border-[#3b82f6]/40 p-6 rounded-lg mb-6 shadow-lg">
                            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4">
                                <h4 class="text-[10px] font-bold uppercase tracking-widest text-[#3b82f6] flex items-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                    S-Rank Objection Handler / PubMed Hook
                                </h4>
                                <button onclick="copyToClipboard(\`${a.objection.replace(/"/g, '&quot;')}\`)" class="bg-[#222] hover:bg-[#3b82f6] hover:text-white text-[#aaa] text-[9px] px-3 py-1.5 rounded border border-[#444] uppercase tracking-widest transition-all shadow-sm">Copy Script</button>
                            </div>
                            <div class="pl-4 border-l-2 border-[#3b82f6]">
                                <p class="text-sm text-[#eee] leading-relaxed">"${a.objection}"</p>
                            </div>
                        </div>
                    `;
                }
                
                if (a.script) {
                    html += `
                        <div class="bg-[#050505] border border-[#ff6b55]/40 p-6 rounded-lg mb-6 shadow-md">
                            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-4">
                                <h4 class="text-[10px] font-bold uppercase tracking-widest text-[#ff6b55] flex items-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                                    Execution Script / Mnemonic
                                </h4>
                                <button onclick="copyToClipboard(\`${a.script.replace(/"/g, '&quot;')}\`)" class="bg-[#222] hover:bg-[#ff6b55] hover:text-white text-[#aaa] text-[9px] px-3 py-1.5 rounded border border-[#444] uppercase tracking-widest transition-all shadow-sm">Copy Script</button>
                            </div>
                            <pre class="text-sm text-white bg-[#111] p-4 border border-[#222] rounded whitespace-pre-wrap font-mono leading-relaxed shadow-inner">${a.script}</pre>
                        </div>
                    `;
                }
                
                if (a.logic) {
                    html += `
                        <div class="bg-[#1a1500]/50 border border-[#f0b429]/30 p-5 rounded-lg shadow-sm">
                            <h4 class="text-[10px] font-bold uppercase tracking-widest text-[#f0b429] mb-3 flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                                Decision Logic / Pipeline Placement
                            </h4>
                            <p class="text-xs text-[#ddd] font-mono leading-relaxed">${a.logic}</p>
                        </div>
                    `;
                }
                html += '</div>'; 
            } else if (!isArchitectMode) {
                 html += `
                    <div class="mt-10 pt-8 border-t border-[#222] flex flex-col items-center justify-center opacity-30">
                        <svg class="w-12 h-12 text-[#555] mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        <p class="text-[10px] mono uppercase tracking-widest text-[#888]">Architect Data Encrypted</p>
                    </div>
                `;
            }
            
            html += '</div>'; 
            display.innerHTML = html;
        }

        function openPasscodeModal() {
            if(isArchitectMode) {
                isArchitectMode = false;
                updateHeaderTheme();
                loadModule(activeModuleId);
                showToast("Architect Mode Disabled");
                return;
            }
            document.getElementById('passcode-input').value = '';
            document.getElementById('passcode-input').placeholder = '••••';
            document.getElementById('passcode-modal').classList.add('active');
            document.getElementById('passcode-input').focus();
        }

        function closePasscodeModal() {
            document.getElementById('passcode-modal').classList.remove('active');
        }

        function verifyPasscode() {
            const val = document.getElementById('passcode-input').value.toUpperCase();
            if(val === 'SRANK' || val === 'WOLF') {
                isArchitectMode = true;
                closePasscodeModal();
                updateHeaderTheme();
                loadModule(activeModuleId);
                showToast("God-Mode Unlocked");
            } else {
                document.getElementById('passcode-input').value = '';
                document.getElementById('passcode-input').placeholder = 'INVALID';
            }
        }

        function updateHeaderTheme() {
            const header = document.getElementById('main-header');
            const title = document.getElementById('header-title');
            const sub = document.getElementById('header-sub');
            const ip = document.getElementById('ip-stamp');
            
            if(isArchitectMode) {
                header.classList.remove('bg-[#111]');
                header.classList.add('bg-[#1a1500]', 'border-[#f0b429]/50');
                title.innerText = "Architect Combat Manual";
                title.classList.replace('text-white', 'text-[#f0b429]');
                sub.innerText = "Biological Architecture // God-Mode Active";
                sub.classList.replace('text-[#888]', 'text-[#f0b429]/70');
                ip.classList.remove('hidden');
            } else {
                header.classList.add('bg-[#111]');
                header.classList.remove('bg-[#1a1500]', 'border-[#f0b429]/50');
                title.innerText = "Sovereign Health Directory";
                title.classList.replace('text-[#f0b429]', 'text-white');
                sub.innerText = "Biological Architecture // Client View";
                sub.classList.replace('text-[#f0b429]/70', 'text-[#888]');
                ip.classList.add('hidden');
            }
        }

        function copyToClipboard(text) {
            const textArea = document.getElementById('copy-textarea');
            textArea.value = text;
            textArea.select();
            try {
                document.execCommand('copy');
                showToast("Copied to Clipboard");
            } catch (err) {
                showToast("Copy Failed");
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast-modal');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('active');
            setTimeout(() => { toast.classList.remove('active'); }, 2000);
        }

        // INIT
        initNav();
        loadModule('f1');
    </script>
</body>
</html>
