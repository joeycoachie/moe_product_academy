        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e0e0e0; height: 100vh; overflow: hidden; }
        .mono { font-family: 'Space Mono', monospace; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        .nav-item { cursor: pointer; border-left: 2px solid transparent; transition: all 0.2s ease; }
        .nav-item:hover { background-color: #1a1a1a; }
        .nav-item.active { border-left-color: #3de0b0; background-color: #111; color: #fff; font-weight: 600; }
        .nav-item.architect-mode.active { border-left-color: #f0b429; }
        
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom Modal Styles */
        #passcode-modal, #toast-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 50; align-items: center; justify-content: center; }
        #passcode-modal.active, #toast-modal.active { display: flex; }
    </style>

                navHtml += `<div class="nav-item p-3 text-xs text-[#aaa]" onclick="loadModule('${key}')" id="nav-${key}">${data.title}</div>`;
            }
            nav.innerHTML = navHtml;
        }

                    `;
                }

                if (a.script) {
                    html += `
                        <div class="bg-[#111] border border-[#444] p-5 rounded-lg mb-6">
                            <div class="flex justify-between items-center mb-3">
                                <h4 class="text-[10px] font-bold uppercase tracking-widest text-[#ff6b55]">Execution Script / Mnemonic</h4>
                                <button onclick="copyToClipboard(\`${a.script.replace(/"/g, '&quot;')}\`)" class="bg-[#222] hover:bg-[#333] text-[#aaa] text-[9px] px-2 py-1 rounded border border-[#444] uppercase">COPY SCRIPT</button>
                            </div>
                            <pre class="text-xs text-white bg-[#050505] p-3 border border-[#222] rounded whitespace-pre-wrap font-mono leading-relaxed">${a.script}</pre>
                        </div>
                    `;
                }

                if (a.logic) {
                    html += `
                        <div class="bg-yellow-900/10 border border-yellow-900/50 p-4 rounded-lg">
                            <h4 class="text-[10px] font-bold uppercase tracking-widest text-[#f0b429] mb-2">Decision Logic / Pipeline</h4>
                            <p class="text-xs text-[#ddd] font-mono">${a.logic}</p>
                        </div>
                    `;
                }

                html += `</div>`; // Close architect section
            }

            html += `</div>`; // Close main container
            display.innerHTML = html;
        }

        function openPasscodeModal() {
            if(isArchitectMode) {
                // Toggle off
                isArchitectMode = false;
                updateHeaderTheme();
                loadModule(activeModuleId);
                showToast("Architect Mode Disabled");
                return;
            }
            document.getElementById('passcode-input').value = '';
            document.getElementById('passcode-modal').classList.add('active');
            document.getElementById('passcode-input').focus();
        }

        function closePasscodeModal() {
            document.getElementById('passcode-modal').classList.remove('active');
        }

        function verifyPasscode() {
            const val = document.getElementById('passcode-input').value.toUpperCase();
            if(val === 'SRANK' || val === 'WOLF') {
                isArchitectMode = true;
                closePasscodeModal();
                updateHeaderTheme();
                loadModule(activeModuleId);
                showToast("Architect Mode Activated");
            } else {
                document.getElementById('passcode-input').value = '';
                document.getElementById('passcode-input').placeholder = 'INVALID';
            }
        }

        function updateHeaderTheme() {
            const header = document.getElementById('main-header');
            const title = document.getElementById('header-title');
            const sub = document.getElementById('header-sub');
            
            if(isArchitectMode) {
                header.classList.remove('bg-[#111]');
                header.classList.add('bg-[#1a1500]', 'border-[#f0b429]/50');
                title.innerText = "Architect Combat Manual";
                title.classList.replace('text-white', 'text-[#f0b429]');
                sub.innerText = "Biological Architecture // God-Mode Unlocked";
                sub.classList.replace('text-[#888]', 'text-[#f0b429]/70');
            } else {
                header.classList.add('bg-[#111]');
                header.classList.remove('bg-[#1a1500]', 'border-[#f0b429]/50');
                title.innerText = "Sovereign Health Directory";
                title.classList.replace('text-[#f0b429]', 'text-white');
                sub.innerText = "Biological Architecture // Client View";
                sub.classList.replace('text-[#f0b429]/70', 'text-[#888]');
            }
        }

        function copyToClipboard(text) {
            const textArea = document.getElementById('copy-textarea');
            textArea.value = text;
            textArea.select();
            try {
                document.execCommand('copy');
                showToast("Copied to Clipboard");
            } catch (err) {
                showToast("Copy Failed");
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast-modal');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('active');
            setTimeout(() => {
                toast.classList.remove('active');
            }, 2000);
        }

        // Initialize
        initNav();
        loadModule('f1');
    </script>
</body>
</html>
